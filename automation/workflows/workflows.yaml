# PipelineKit provides configuration driven workflow definition
#   - Each workflow would result as respective PipelineKit Job on Jenkins
#
# Know more about available `workflows.yaml` configurations,
# Go to wiki -
# https://wiki.cornerstoneondemand.com/display/PLK/PipelineKit+-+workflows.yaml

Workflows:
  - Name: Refresh Procedure
    Jenkinsfile: refresh-procedure.jf
    Environment: true
    Branch: master
    Description: |+
      Delete all users and jobs for qaAws portal
    Schedule:
      Config:
        - '0 20 * * * % 
        AWS_ACCOUNT=437677490818; 
        AWS_REGIONS=us-west-1; 
        AWS_ENVIRONMENTS=dev-int; 
        JIRA_ID=TM-4608; 
        CONFIG=qaAws;
        GIT_TAG=master '
        - '15 20 * * * % 
        AWS_ACCOUNT=437677490818; 
        AWS_REGIONS=us-west-1; 
        AWS_ENVIRONMENTS=dev-int; 
        JIRA_ID=TM-4608; 
        CONFIG=previewEu;
        GIT_TAG=v24.5.1 '
      AdUsername: tskrzypek
      DisableDevelop: true

  - Name: Singe Test
    Jenkinsfile: single-test.jf
    Environment: true
    Branch: master
    Description: |+
      Single test run

  - Name: Area Suite
    Jenkinsfile: area-suite.jf
    Environment: true
    Branch: master
    Description: |+
      All tests from particular area

  - Name: Manual Rerun
    Jenkinsfile: manual-rerun.jf
    Environment: true
    Branch: master
    Description: |+
      Manual Rerun for any suite

  - Name: Translation Suite
    Jenkinsfile: translation-suite.jf
    Environment: true
    Branch: master
    Description: |+
      Job for translation check in TM project

